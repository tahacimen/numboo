name: Tests

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Pure game-core unit tests need no dependencies or browser.
      - name: Run unit tests
        run: node test/game.test.js
