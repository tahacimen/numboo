name: Build Android APK

# Builds a debug APK on every push and makes it downloadable as a build
# artifact. Trigger manually from the Actions tab (workflow_dispatch) or on
# pushes to the main branches.
on:
  push:
    branches: ["main", "claude/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Generate & sync Capacitor Android project
        run: |
          if [ ! -d android ]; then npx cap add android; else npx cap sync android; fi
          node scripts/apply-android-config.js

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NumDrop-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
